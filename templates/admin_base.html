<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Parsun Batam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-active { background-color: rgba(255, 255, 255, 0.1); border-left: 4px solid #FFD700; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white hidden md:flex flex-col sticky top-0 h-screen">
            <div class="p-6 border-b border-slate-800">
                <a href="/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold tracking-wider text-yellow-500">PARSUN</span>
                    <span class="text-xs font-light text-gray-400">ADMIN</span>
                </a>
            </div>
            
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <a href="{{ url_for('admin_dashboard') }}" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition {{ 'sidebar-active' if request.path == url_for('admin_dashboard') }}">
                    <i class="fas fa-chart-line w-6"></i>
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('admin_categories') }}" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition {{ 'sidebar-active' if request.path.startswith(url_for('admin_categories')) }}">
                    <i class="fas fa-tags w-6"></i>
                    <span>Kategori</span>
                </a>
                <a href="{{ url_for('admin_list') }}" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition {{ 'sidebar-active' if request.path == url_for('admin_list') }}">
                    <i class="fas fa-box w-6"></i>
                    <span>Produk</span>
                </a>
                <a href="{{ url_for('admin_add') }}" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition {{ 'sidebar-active' if request.path == url_for('admin_add') }}">
                    <i class="fas fa-plus-circle w-6"></i>
                    <span>Tambah Produk</span>
                </a>
                <a href="{{ url_for('admin_catalog_list') }}" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition {{ 'sidebar-active' if request.path == url_for('admin_catalog_list') }}">
                    <i class="fas fa-image w-6"></i>
                    <span>Katalog Gambar</span>
                </a>
                <a href="{{ url_for('admin_upload_catalog') }}" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition {{ 'sidebar-active' if request.path == url_for('admin_upload_catalog') }}">
                    <i class="fas fa-upload w-6"></i>
                    <span>Upload Katalog</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <a href="{{ url_for('admin_logout') }}" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-red-500/10 text-red-400 transition">
                    <i class="fas fa-sign-out-alt w-6"></i>
                    <span>Keluar</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Header -->
            <header class="bg-white shadow-sm p-4 flex items-center justify-between sticky top-0 z-40">
                <div class="flex items-center space-x-4">
                    <button class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
                    <h1 class="text-xl font-bold text-gray-800">{% block header_title %}Dashboard{% endblock %}</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <div class="text-sm font-bold">Administrator</div>
                        <div class="text-xs text-gray-500">Online</div>
                    </div>
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                        A
                    </div>
                </div>
            </header>

            <!-- Content -->
            <main class="p-6">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

</body>
</html>
