<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ brand }} Catalog - Parsun Batam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='catalog.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <div class="page-header">
            <a href="{{ url_for('catalog_home') }}" class="back-button">← Back to Brands</a>
            <h1>{{ brand }}</h1>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search catalogs..." class="search-input">
        </div>

        <div class="loading" id="loadingSpinner">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>

        <div class="catalogs-grid" id="catalogsGrid">
            {% if items %}
                {% for item in items %}
                <div class="catalog-card" data-name="{{ item.name }}">
                    <div class="catalog-image">
                        <img src="{{ url_for('static', filename='catalog_images/' + item.file) }}" alt="{{ item.name }}" loading="lazy">
                        {% if item.type == 'pdf' %}
                        <div class="pdf-overlay">PDF</div>
                        {% endif %}
                    </div>
                    <div class="catalog-info">
                        <h3>{{ item.name }}</h3>

                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    <div class="empty-icon">📄</div>
                    <p>No catalogs found for {{ brand }}</p>
                </div>
            {% endif %}
        </div>
    </main>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closePreview()">&times;</button>
            <img id="previewImage" src="" alt="Preview">
        </div>
    </div>

    <script src="{{ url_for('static', filename='catalog.js') }}"></script>
</body>
</html>
